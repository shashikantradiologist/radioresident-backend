{% extends "layout.html" %}
{% block title %}Quiz – Question {{ idx }}{% endblock %}

{% block body %}
<div class="container py-4" style="max-width: 900px;">
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4 p-md-5">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="small text-muted">10 Marks Radiology Drill</div>
        <div class="badge text-bg-light border">Q {{ idx }} / {{ total }}</div>
      </div>

      <h5 class="mb-4">{{ q.prompt }}</h5>

      <form method="post" action="{{ url_for('quiz.answer') }}">
        <div class="d-grid gap-2">
          <label class="btn btn-outline-primary text-start">
            <input type="radio" name="selected" value="A" class="form-check-input me-2">
            <strong>A.</strong> {{ q.option_a }}
          </label>

          <label class="btn btn-outline-primary text-start">
            <input type="radio" name="selected" value="B" class="form-check-input me-2">
            <strong>B.</strong> {{ q.option_b }}
          </label>

          <label class="btn btn-outline-primary text-start">
            <input type="radio" name="selected" value="C" class="form-check-input me-2">
            <strong>C.</strong> {{ q.option_c }}
          </label>

          <label class="btn btn-outline-primary text-start">
            <input type="radio" name="selected" value="D" class="form-check-input me-2">
            <strong>D.</strong> {{ q.option_d }}
          </label>
        </div>

        <div class="d-flex justify-content-end mt-4">
          <button class="btn btn-primary px-4" type="submit">Next</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
